<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <main class="weather">
        <form class="form">
            <input class="form__city-input" type="text" name="city" placeholder="Enter city name">
            <button class="form__search-btn" type="submit"><img src="./img/search-icon.svg" alt="Search icon"></button>
        </form>
        <img class="weather__img" src="./img/lightning-rain.png" alt="Weather icon">
        <section class="current__weather">
            <h1 class="current__weater-temp">22°c</h1>
            <h2 class="current__weather-city">Moscow</h2>
        </section>
        <section class="weather__info">
            <div class="weather__info-humidity">
                <img src="./img/humidity.png" alt="Humidity" class="humidity-img">
                <div class="humidity-desc">
                    <p class="humidity-desc-value">50%</p>
                    <p class="humidity-desc-title">Humidity</p>
                </div>   
            </div>
            <div class="weather__info-wind">
                <img class="wind-img" src="./img/wind.png" alt="Wind speed">
                <div class="wind-desc">
                    <p class="wind-desc-value">10km/h</p>
                    <p class="wind-desc-title">Wind speed</p>
                </div> 
            </div>
        </section>
    </main>
    <script src="./src/main.js"></script>
</body>
</html>
